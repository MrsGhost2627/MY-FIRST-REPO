<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Thaija Wilson - My First Repo</title>
      <style>
         * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
         }

         body {
            font-family: Arial, sans-serif;
            background-color: #0a0a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
         }

         .container {
            text-align: center;
            padding: 50px;
            border: 2px solid #185fa5;
            border-radius: 16px;
            background-color: #0d1b2a;
            max-width: 600px;
            width: 90%;
         }

         .badge {
            display: inline-block;
            background-color: #185fa5;
            color: white;
            font-size: 13px;
            padding: 5px 16px;
            border-radius: 20px;
            margin-bottom: 20px;
            letter-spacing: 0.05em;
         }

         h1 {
            font-size: 36px;
            color: #ffffff;
            margin-bottom: 10px;
         }

         h1 span {
            color: #4da6ff;
         }

         p {
            font-size: 16px;
            color: #aaaaaa;
            margin-bottom: 30px;
         }

         .btn {
            display: inline-block;
            padding: 12px 40px;
            background-color: #185fa5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s, transform 0.1s;
         }

         .btn:hover {
            background-color: #0c447c;
         }

         .btn:active {
            transform: scale(0.98);
         }

         .divider {
            width: 60px;
            height: 3px;
            background-color: #185fa5;
            margin: 0 auto 30px;
            border-radius: 2px;
         }

         .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #555;
         }
      </style>
   </head>
   <body>

      <div class="container">
         <span class="badge">SDEV 255 — Spring 2026</span>
         <h1>Welcome to <span>Thaija Wilson's</span> Website</h1>
         <p>Web Application Development Student</p>
         <div class="divider"></div>
         <button class="btn" onclick="alert('Thanks for visiting my website!')">Visit My Site</button>
         <div class="footer">Built with HTML & CSS — My First Repo</div>
      </div>

   </body>
</html>
